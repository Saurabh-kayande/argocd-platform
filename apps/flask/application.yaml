apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: flask-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Saurabh-kayande/argocd-demo.git
    targetRevision: main
    path: manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
